name: SoundStage Production CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build and Analyze
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Allows tools to see full history for better analysis

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle # Automagically caches dependencies to save time

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Run Static Analysis (Lint)
        # This checks for performance leaks, accessibility, and correct API usage
        run: ./gradlew lintDebug

      - name: Build Debug APK
        # We use --no-daemon for CI environments to save memory
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload Analysis Report
        if: always() # Upload even if the build fails so you can see why
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html

      - name: Store Production-Ready APK
        uses: actions/upload-artifact@v4
        with:
          name: soundstage-debug-build
          path: app/build/outputs/apk/debug/app-debug.apk
